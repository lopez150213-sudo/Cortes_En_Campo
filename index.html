<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Cortes en Campo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h2>Registro de Gestión</h2>
    <form id="cutForm">
        <div class="form-group">
            <label for="contrato">Número de Contrato</label>
            <input type="text" id="contrato" required inputmode="numeric" placeholder="Ej: 102938">
        </div>
        
        <div class="form-group">
            <label for="nombre">Nombre del Cliente</label>
            <input type="text" id="nombre" required placeholder="Nombre completo">
        </div>

        <div class="form-group">
            <label for="gestor">Gestor en Campo</label>
            <select id="gestor" required>
                <option value="" disabled selected>Seleccione un gestor</option>
                <option value="JOSE BRIZUELA">JOSE BRIZUELA</option>
                <option value="JOSE MIGUEL">JOSE MIGUEL</option>
                <option value="HOLMAN CUEVAS">HOLMAN CUEVAS</option>
                <option value="GEOVANNY MANZANAREZ">GEOVANNY MANZANAREZ</option>
                <option value="ALEJANDRO REYES">ALEJANDRO REYES</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="estado">Estado del Cliente</label>
            <select id="estado" required>
                <option value="Cortado Poste" selected>Cortado Poste</option>
                <option value="Cortado ONU">Cortado ONU</option>
                <option value="Reconectado">Reconectado</option>
                <option value="No se pudo cortar">No se pudo cortar</option>
            </select>
        </div>
        
        <button type="submit" id="btnSubmit">Publicar en Caliente</button>
    </form>
    
    <div id="statusMessage"></div>
</div>

<script src="app.js"></script>
</body>
</html>
